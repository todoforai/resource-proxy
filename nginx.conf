# Nginx config for resource subdomains.
# Each subdomain rewrites to /:resourceType/:resourceId on the proxy server.
#
# browser.todofor.ai/:sessionId  → proxy :5000/browser/:sessionId
# vm.todofor.ai/:vmId            → proxy :5000/vm/:vmId
# terminal.todofor.ai/:sessionId → proxy :5000/terminal/:sessionId

map $host $resource_type {
    browser.todofor.ai   browser;
    vm.todofor.ai        vm;
    terminal.todofor.ai  terminal;
    default              "";
}

server {
    listen 443 ssl;
    server_name browser.todofor.ai vm.todofor.ai terminal.todofor.ai;

    # ssl_certificate     /etc/letsencrypt/live/todofor.ai/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/todofor.ai/privkey.pem;

    location / {
        # Rewrite /:id → /:resourceType/:id before proxying
        rewrite ^/(.*)$ /$resource_type/$1 break;

        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;

        # Keep connections alive for long-running CDP sessions
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
